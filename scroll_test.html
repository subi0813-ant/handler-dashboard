<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body { margin: 0; padding: 16px; background: #f0f0f0; }
.card { background: white; border-radius: 12px; padding: 16px; margin-bottom: 16px; }
.scroll-wrap { overflow-x: auto; -webkit-overflow-scrolling: touch; }
.wide-content { min-width: 800px; height: 100px; background: linear-gradient(to right, #00a86b, #2b7fff); border-radius: 8px; display: flex; align-items: center; justify-content: center; color: white; font-size: 20px; font-weight: bold; }
</style>
</head>
<body>
<div class="card">
  <p style="margin:0 0 8px;font-weight:bold;">👆 이 박스 안에서 좌우로 밀어보세요</p>
  <div class="scroll-wrap">
    <div class="wide-content">← 좌우 스크롤 테스트 →</div>
  </div>
</div>
</body>
</html>
