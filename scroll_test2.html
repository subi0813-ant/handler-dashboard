<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
:root {
  --bg:#f4f5f8; --surface:#fff; --surface2:#f0f1f5;
  --border:#e2e4ec; --shadow:0 2px 16px rgba(60,70,120,0.08);
  --green:#00a86b; --blue:#2b7fff;
  --text:#1a1d2e; --muted:#7a7f99;
}
*(margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:'Noto Sans KR',sans-serif;min-height:100vh;}
.wrap{max-width:1280px;margin:0 auto;padding:20px 16px;}
.card{background:var(--surface);border-radius:16px;box-shadow:var(--shadow);padding:16px;}
.two-col{display:grid;grid-template-columns:minmax(0,1fr) minmax(0,1fr);gap:20px;margin-bottom:20px;}
.col-stretch{display:flex;flex-direction:column;}
.monthly-card-scroll{overflow-x:auto;-webkit-overflow-scrolling:touch;}
@media(max-width:860px){
  .two-col{grid-template-columns:1fr!important;}
  .col-stretch{display:block!important;width:100%!important;}
  .two-col{overflow:visible!important;}
  .col-stretch{overflow:visible!important;}
}
</style>
</head>
<body>
<div class="wrap">
  <div class="two-col">
    <div class="col-stretch">
      <p style="font-weight:bold;margin-bottom:8px;">월별 수익 현황 테스트</p>
      <div class="card">
        <div class="monthly-card-scroll">
          <div style="min-width:600px;height:100px;background:linear-gradient(to right,#00a86b,#2b7fff);border-radius:8px;display:flex;align-items:center;justify-content:center;color:white;font-weight:bold;">← 좌우 스크롤 테스트 →</div>
        </div>
      </div>
    </div>
    <div class="col-stretch">
      <p style="font-weight:bold;margin-bottom:8px;">주간 수입 현황 테스트</p>
      <div class="card">
        <div style="overflow-x:auto;-webkit-overflow-scrolling:touch;">
          <div style="min-width:600px;height:100px;background:linear-gradient(to right,#2b7fff,#00a86b);border-radius:8px;display:flex;align-items:center;justify-content:center;color:white;font-weight:bold;">← 좌우 스크롤 테스트 →</div>
        </div>
      </div>
    </div>
  </div>
</div>
</body>
</html>
